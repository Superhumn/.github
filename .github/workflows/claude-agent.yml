name: Claude Code Agent

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '**/package-lock.json'
      - '**/yarn.lock'
      - '**/pnpm-lock.yaml'
      - '**/bun.lockb'
      - '**/poetry.lock'
      - '**/Cargo.lock'
      - '**/Gemfile.lock'

concurrency:
  group: claude-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review-and-fix-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: vars.CLAUDE_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Check PR size
        id: size
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          stats=$(gh pr view "$PR_NUMBER" --json additions,deletions)
          total=$(echo "$stats" | jq '.additions + .deletions')
          echo "Total LOC changed: $total"
          if [ "$total" -gt 2000 ]; then
            echo "PR too large (${total} LOC); skipping Claude review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.size.outputs.skip == 'false'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token || github.token }}
          prompt: |
            Review this PR. If there are bugs, security issues, or code quality
            problems, fix them. First try pushing fixup commits to the PR
            branch; if the push is rejected (protected branch, required
            reviews, signed commits, fork without write access), instead open
            a new PR from a `claude/fixup-<pr-number>` branch targeting the
            original PR branch and link it in a review comment. Always post a
            short comment explaining what you changed or, if the code looks
            good, a brief approval comment.
          claude_args: --model claude-sonnet-4-6

  fix-issue:
    if: >-
      github.event_name == 'issues' &&
      github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: vars.CLAUDE_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token || github.token }}
          prompt: |
            Read this issue. Create a `claude/issue-<issue-number>` branch,
            implement the fix or feature, run any available tests, then open a
            PR linking the issue. Keep changes minimal.
          claude_args: --model claude-haiku-4-5
